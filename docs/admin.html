<!doctype html><html lang='nl'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>ALSO Cloud Events Admin</title><style>*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;background:#f4f6fb;color:#1f2937}header{background:#111827;color:white;padding:30px 24px}.wrap,main{max-width:1280px;margin:0 auto}main{padding:28px 24px}.logo{height:48px}.panel{background:white;border:1px solid #e5e7eb;border-radius:16px;padding:22px;margin-bottom:22px}.grid{display:grid;grid-template-columns:340px 1fr;gap:22px}.split{display:grid;grid-template-columns:1fr 1fr;gap:22px}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}.stat{background:#f8fbff;border:1px solid #dbeafe;border-radius:14px;padding:16px}.stat strong{font-size:26px}label{display:block;font-weight:bold;margin-top:12px}input,select,textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;margin-top:6px}textarea{min-height:130px}.invalid{border-color:#b91c1c!important;background:#fef2f2!important}button,.button{background:#111827;color:white;padding:11px 16px;border:0;border-radius:9px;font-weight:bold;margin-top:12px;cursor:pointer;text-decoration:none;display:inline-block}.secondary{background:#374151}.light{background:#eef2ff;color:#111827}.danger{background:#b91c1c}.ok{background:#065f46}.orange{background:#b45309}.button-row{display:flex;flex-wrap:wrap;gap:10px}.event-item{border:1px solid #e5e7eb;border-radius:12px;padding:11px;background:#fafafa;cursor:pointer;margin-bottom:8px}.event-item.active{border-color:#2563eb;background:#eff6ff}.badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:12px;background:#eef2ff}.status{margin-top:12px;padding:12px;border-radius:10px;display:none}.okmsg{display:block;background:#ecfdf5;color:#065f46}.errmsg{display:block;background:#fef2f2;color:#991b1b}.warning{display:none;background:#fffbeb;color:#92400e;padding:12px;border-radius:12px;margin-top:12px}pre{white-space:pre-wrap;background:#111827;color:white;padding:18px;border-radius:12px;overflow:auto;max-height:360px}@media(max-width:900px){.grid,.split,.stats{grid-template-columns:1fr}}</style></head><body><header><div class='wrap'><img class='logo' src='assets/also-logo.png'><h1>ALSO Cloud Events Admin</h1><p>Schone V14: stabiel eventbeheer.</p></div></header><main><section class='panel'><h2>Dashboard</h2><div class='stats'><div class='stat'><strong id='statTotal'>0</strong><span>Totaal</span></div><div class='stat'><strong id='statPublished'>0</strong><span>Published</span></div><div class='stat'><strong id='statDraft'>0</strong><span>Draft</span></div><div class='stat'><strong id='statArchived'>0</strong><span>Archived</span></div><div class='stat'><strong id='statUpcoming'>0</strong><span>Aankomend</span></div></div></section><section class='panel'><h2>Publiceren</h2><label>Admin key<input id='adminKeyInput' type='password'></label><div class='button-row'><button onclick='saveAdminKey()'>Key tijdelijk opslaan</button><button class='secondary' onclick='loadEvents()'>Events laden</button><button class='light' onclick='newEvent()'>Nieuw event</button><button class='ok' onclick='publishToGitHub()'>Publiceer naar GitHub</button><a class='button light' href='index.html'>Publieke pagina bekijken</a></div><div id='publishStatus' class='status'></div></section><div class='grid'><section class='panel'><h2>Events</h2><div class='toolbar'><input id='listSearch' placeholder='Zoeken...'><select id='statusFilter'><option value='all'>Alle statussen</option><option value='published'>Published</option><option value='draft'>Draft</option><option value='archived'>Archived</option></select></div><div id='eventList'></div></section><section class='panel'><h2 id='formTitle'>Event</h2><label>Titel *<input id='title'></label><label>Unieke ID *<input id='eventId'></label><label>Status *<select id='statusField'><option value='published'>Published</option><option value='draft'>Draft</option><option value='archived'>Archived</option></select></label><label>Categorie *<select id='category'><option value='webinar'>🟦 Webinar</option><option value='solution-training'>🟩 Solution Training</option><option value='workshop'>🟨 Workshop</option><option value='partner-event'>🟪 Partner Event</option><option value='cloud-summit'>⭐ ALSO Cloud Summit</option><option value='microsoft-event'>🔴 Microsoft Event</option></select></label><label>Featured *<select id='featured'><option value='false'>Nee</option><option value='true'>Ja</option></select></label><label>Hele dag *<select id='allDay'><option value='false'>Nee</option><option value='true'>Ja</option></select></label><label>Datum *<input id='date' type='date'></label><div id='timeFields'><label>Starttijd<input id='startTime' type='time' value='10:00'></label><label>Eindtijd<input id='endTime' type='time' value='11:00'></label></div><label>Locatie *<input id='location'></label><label>Registratie URL *<input id='registration'></label><label>Banner URL<input id='bannerUrl'></label><label>Tags *<input id='tags'></label><label>Beschrijving *<textarea id='description' maxlength='1500'></textarea></label><div><span id='charCount'>0</span> / 1500</div><div id='warnings' class='warning'></div><div class='button-row'><button onclick='saveEvent()'>Event opslaan</button><button class='secondary' onclick='duplicateEvent()'>Dupliceren</button><button class='orange' onclick='archiveEvent()'>Archiveren</button><button class='danger' onclick='deleteEvent()'>Verwijderen</button><button class='light' onclick='undoLast()'>Ongedaan maken</button><button class='light' onclick='copyJson()'>Kopieer JSON</button></div></section></div><div class='split'><section class='panel'><h2>Live preview</h2><div id='preview'></div></section><section class='panel'><h2>JSON preview</h2><pre id='output'></pre></section></div></main><script>const publishConfig={"enabled": true, "endpointUrl": "https://default95924808304441779c1b713746ffab.95.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/4325ffde425047dd94d1db6cd4362879/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=TFfLGBWAxDmA9rSGMoPnEHHjdXcreusPslXZi2I1AKY", "adminKey": "", "repository": "MelvinSeevinck/ALSO-Cloud-Agenda", "branch": "main", "filePath": "data/events-source.json"};const categories={"webinar": {"label": "🟦 Webinar"}, "solution-training": {"label": "🟩 Solution Training"}, "workshop": {"label": "🟨 Workshop"}, "partner-event": {"label": "🟪 Partner Event"}, "cloud-summit": {"label": "⭐ ALSO Cloud Summit"}, "microsoft-event": {"label": "🔴 Microsoft Event"}};let events=[],selectedId=null,undoStack=[];const $=id=>document.getElementById(id);function slug(v){return(v||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')}function eventDate(e){return e.allDay?e.date:String(e.start||'').slice(0,10)}function selected(){return events.find(e=>e.id===selectedId)}function msg(m,t){publishStatus.textContent=m;publishStatus.className='status '+t}function saveAdminKey(){sessionStorage.setItem('alsoAdminPublishKey',adminKeyInput.value.trim());msg('Admin key opgeslagen.','okmsg')}function key(){return sessionStorage.getItem('alsoAdminPublishKey')||adminKeyInput.value.trim()}async function loadEvents(){const r=await fetch('events-admin.json?ts='+Date.now());events=await r.json();render();if(events.length)selectEvent(events[0].id)}function snapshot(){undoStack.push(JSON.stringify(events));if(undoStack.length>20)undoStack.shift()}function undoLast(){if(!undoStack.length)return alert('Geen actie.');events=JSON.parse(undoStack.pop());selectedId=null;render()}function render(){stats();list();previewJson()}function stats(){const today=new Date().toISOString().slice(0,10);statTotal.textContent=events.length;statPublished.textContent=events.filter(e=>(e.status||'published')==='published').length;statDraft.textContent=events.filter(e=>e.status==='draft').length;statArchived.textContent=events.filter(e=>e.status==='archived').length;statUpcoming.textContent=events.filter(e=>(eventDate(e)||'')>=today&&(e.status||'published')==='published').length}function list(){const q=(listSearch.value||'').toLowerCase(),sf=statusFilter.value;const filtered=events.filter(e=>(sf==='all'||(e.status||'published')===sf)&&(!q||JSON.stringify(e).toLowerCase().includes(q)));eventList.innerHTML=filtered.map(e=>`<div class='event-item ${e.id===selectedId?'active':''}' onclick="selectEvent('${e.id}')"><strong>${e.title} <span class='badge'>${e.status||'published'}</span></strong><span>${eventDate(e)} · ${categories[e.category]?.label||e.category}</span></div>`).join('')||'<p>Geen events.</p>'}function selectEvent(id){selectedId=id;const e=selected();if(!e)return;title.value=e.title||'';eventId.value=e.id||'';statusField.value=e.status||'published';category.value=e.category||Object.keys(categories)[0];featured.value=String(!!e.featured);allDay.value=String(!!e.allDay);date.value=e.allDay?e.date:String(e.start||'').slice(0,10);startTime.value=e.allDay?'10:00':String((e.start||'T10:00').split('T')[1]).slice(0,5);endTime.value=e.allDay?'11:00':String((e.end||'T11:00').split('T')[1]).slice(0,5);location.value=e.location||'';registration.value=e.registrationUrl||'';bannerUrl.value=e.bannerUrl||'';tags.value=(e.tags||[]).join(', ');description.value=e.description||'';toggleTime();render();preview(e)}function newEvent(){selectedId=null;['title','eventId','date','location','registration','bannerUrl','tags','description'].forEach(i=>$(i).value='');statusField.value='draft';featured.value='false';allDay.value='false';toggleTime();render()}function toggleTime(){timeFields.style.display=allDay.value==='true'?'none':'block'}function valid(){let ok=true;[title,eventId,statusField,category,featured,allDay,date,location,registration,tags,description].forEach(el=>{const good=(el.value||'').trim();el.classList.toggle('invalid',!good);if(!good)ok=false});if(registration.value&&!/^https?:\/\//i.test(registration.value)){registration.classList.add('invalid');msg('Registratie URL moet met https:// beginnen.','errmsg');return false}if(events.some(e=>e.id===eventId.value.trim()&&e.id!==selectedId)){eventId.classList.add('invalid');msg('Dubbele unieke ID.','errmsg');return false}if(!ok)msg('Vul alle verplichte velden in.','errmsg');return ok}function read(){const e={id:eventId.value.trim(),title:title.value.trim(),status:statusField.value,location:location.value.trim(),category:category.value,featured:featured.value==='true',tags:tags.value.split(',').map(t=>t.trim()).filter(Boolean),registrationUrl:registration.value.trim(),bannerUrl:bannerUrl.value.trim(),description:description.value.trim()};if(allDay.value==='true'){e.date=date.value;e.allDay=true}else{e.start=`${date.value}T${startTime.value||'10:00'}:00`;e.end=`${date.value}T${endTime.value||'11:00'}:00`;e.allDay=false}return e}function saveEvent(){if(!valid())return false;snapshot();const e=read(),idx=events.findIndex(x=>x.id===selectedId||x.id===e.id);if(idx>=0)events[idx]=e;else events.push(e);events.sort((a,b)=>(eventDate(a)||'').localeCompare(eventDate(b)||''));selectedId=e.id;render();preview(e);msg('Event opgeslagen in lokale lijst. Publiceer om live te zetten.','okmsg');return true}function duplicateEvent(){if(!selectedId)return alert('Selecteer event.');snapshot();const b=selected(),e={...b,id:b.id+'-copy',title:b.title+' kopie',status:'draft'};events.push(e);selectedId=e.id;selectEvent(e.id)}function archiveEvent(){if(!selectedId)return;snapshot();selected().status='archived';render();selectEvent(selectedId)}function deleteEvent(){if(!selectedId)return;if(!confirm('Definitief verwijderen?'))return;snapshot();events=events.filter(e=>e.id!==selectedId);selectedId=null;newEvent()}function preview(e){previewJson();document.getElementById('preview').innerHTML=`<h3>${e.title}</h3><p>${eventDate(e)} · ${e.location} · ${e.status}</p><p>${(e.description||'').replace(/
/g,'<br>')}</p>`;charCount.textContent=(description.value||'').length}function previewJson(){output.textContent=JSON.stringify(events,null,2)}async function publishToGitHub(){if(!saveEvent())return;if(!key())return msg('Vul admin key in.','errmsg');const r=await fetch(publishConfig.endpointUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminKey:key(),events:events,commitMessage:'Update events from V14 clean admin',timestampUtc:new Date().toISOString()})});if(!r.ok)return msg('Publiceren mislukt: HTTP '+r.status,'errmsg');msg('Publicatie verzonden. Controleer GitHub Actions.','okmsg')}function copyJson(){navigator.clipboard.writeText(JSON.stringify(events,null,2))}title.addEventListener('input',()=>{if(!selectedId&&!eventId.value)eventId.value=slug(title.value)});description.addEventListener('input',()=>charCount.textContent=description.value.length);allDay.addEventListener('change',toggleTime);listSearch.addEventListener('input',list);statusFilter.addEventListener('change',list);adminKeyInput.value=sessionStorage.getItem('alsoAdminPublishKey')||'';loadEvents().catch(e=>msg('Laden mislukt: '+e.message,'errmsg'));</script></body></html>
