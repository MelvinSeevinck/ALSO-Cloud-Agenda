<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ALSO Cloud Events Admin</title>
  <style>
    *{box-sizing:border-box}
    body{font-family:Arial,sans-serif;margin:0;background:#f4f6fb;color:#111827}
    header{background:#111827;color:white;padding:30px 24px}
    .wrap,main{max-width:1280px;margin:0 auto}
    main{padding:28px 24px}
    .logo{height:54px;width:auto;margin-bottom:14px}
    .panel{background:white;border:1px solid #e5e7eb;border-radius:16px;padding:22px;margin-bottom:22px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .grid{display:grid;grid-template-columns:360px 1fr;gap:22px}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:22px}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .stat{background:#f8fbff;border:1px solid #dbeafe;border-radius:14px;padding:16px}
    .stat strong{display:block;font-size:26px}
    label{display:block;font-weight:bold;margin-top:12px}
    label.req::after{content:" *";color:#b91c1c}
    input,select,textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;margin-top:6px;font:inherit}
    textarea{min-height:130px}
    input.invalid,select.invalid,textarea.invalid{border-color:#b91c1c;background:#fef2f2}
    button,.button{background:#111827;color:white;padding:11px 16px;border:0;border-radius:9px;font-weight:bold;margin-top:12px;cursor:pointer;text-decoration:none;display:inline-block}
    .light{background:#eef2ff!important;color:#111827!important}.ok{background:#065f46!important}.danger{background:#b91c1c!important}.orange{background:#b45309!important}
    .button-row{display:flex;flex-wrap:wrap;gap:10px}
    .status{margin-top:12px;padding:12px;border-radius:10px;display:none}
    .status.okmsg{display:block;background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
    .status.errmsg{display:block;background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
    .event-item{border:1px solid #e5e7eb;border-radius:12px;padding:11px;background:#fafafa;cursor:pointer;margin-bottom:8px}
    .event-item.active{border-color:#2563eb;background:#eff6ff}
    .event-item.archived{opacity:.55}
    .badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:12px;background:#eef2ff}
    .warning{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:12px;padding:12px;margin-top:12px;display:none}
    pre{white-space:pre-wrap;background:#111827;color:white;padding:18px;border-radius:12px;overflow:auto;max-height:360px}
    @media(max-width:1050px){.grid,.split,.stats{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header>
  <div class="wrap">
    <img class="logo" src="assets/also-logo.png" alt="ALSO logo">
    <h1>ALSO Cloud Events Admin</h1>
    <p>Beheer events, concepten, archief en publicatie.</p>
  </div>
</header>

<main>
  <section class="panel">
    <h2>Systeemstatus</h2>
    <div id="systemStatus" class="status okmsg">Admin geladen. Events worden opgehaald...</div>
  </section>

  <section class="panel">
    <h2>Publiceren</h2>
    <label>Admin key<input id="adminKeyInput" type="password" placeholder="ALSO-Cloud-Events-2026-..."></label>
    <div class="button-row">
      <button onclick="saveAdminKey()">Key tijdelijk opslaan</button>
      <button onclick="loadEvents()">Events laden</button>
      <button class="light" onclick="newEvent()">Nieuw event</button>
      <button class="ok" onclick="publishToGitHub()">Publiceer naar GitHub</button>
      <a class="button light" href="index.html">Publieke pagina bekijken</a>
    </div>
    <div id="publishStatus" class="status"></div>
  </section>

  <section class="panel">
    <h2>Dashboard</h2>
    <div class="stats">
      <div class="stat"><strong id="statTotal">0</strong><span>Totaal</span></div>
      <div class="stat"><strong id="statPublished">0</strong><span>Published</span></div>
      <div class="stat"><strong id="statDraft">0</strong><span>Draft</span></div>
      <div class="stat"><strong id="statArchived">0</strong><span>Archived</span></div>
    </div>
  </section>

  <div class="grid">
    <section class="panel">
      <h2>Events</h2>
      <input id="listSearch" placeholder="Zoeken...">
      <select id="statusFilter">
        <option value="all">Alle statussen</option>
        <option value="published">Published</option>
        <option value="draft">Draft</option>
        <option value="archived">Archived</option>
      </select>
      <div id="eventList"></div>
    </section>

    <section class="panel">
      <h2 id="formTitle">Event aanmaken of wijzigen</h2>
      <label>Template
        <select id="templatePicker" onchange="applyTemplate()">
          <option value="">Geen template</option>
          <option value="webinar">Webinar</option>
          <option value="workshop">Workshop</option>
          <option value="solution-training">Solution Training</option>
          <option value="partner-event">Partner Event</option>
          <option value="cloud-summit">Cloud Summit</option>
        </select>
      </label>
      <label class="req">Titel<input id="title" required></label>
      <label class="req">Unieke ID<input id="eventId" required></label>
      <label class="req">Status<select id="statusField" required><option value="published">Published</option><option value="draft">Draft</option><option value="archived">Archived</option></select></label>
      <label class="req">Categorie<select id="category" required></select></label>
      <label class="req">Featured?<select id="featured" required><option value="false">Nee</option><option value="true">Ja</option></select></label>
      <label class="req">Hele dag?<select id="allDay" onchange="toggleTime()" required><option value="false">Nee</option><option value="true">Ja</option></select></label>
      <label class="req">Datum<input id="date" type="date" required></label>
      <div id="timeFields">
        <label>Starttijd<input id="startTime" type="time" value="10:00"></label>
        <label>Eindtijd<input id="endTime" type="time" value="11:00"></label>
      </div>
      <label class="req">Locatie<input id="location" required></label>
      <label class="req">Registratie URL<input id="registration" required placeholder="https://..."></label>
      <label>Banner URL<input id="bannerUrl" placeholder="https://..."></label>
      <label class="req">Tags, gescheiden met komma's<input id="tags" required></label>
      <label class="req">Beschrijving<textarea id="description" required maxlength="1500"></textarea></label>
      <div id="warnings" class="warning"></div>
      <div class="button-row">
        <button onclick="saveEvent()">Event opslaan</button>
        <button onclick="duplicateEvent()">Dupliceren</button>
        <button class="orange" onclick="archiveEvent()">Archiveren</button>
        <button class="danger" onclick="deleteEvent()">Verwijderen</button>
        <button class="light" onclick="undoLast()">Ongedaan maken</button>
        <button class="light" onclick="copyJson()">Kopieer JSON</button>
      </div>
    </section>
  </div>

  <div class="split">
    <section class="panel">
      <h2>Live preview</h2>
      <div id="preview"></div>
    </section>
    <section class="panel">
      <h2>JSON preview</h2>
      <pre id="output"></pre>
    </section>
  </div>
</main>

<script>
let CONFIG = {};
let EVENTS = [];
let selectedId = null;
let undoStack = [];

const templates = {
  webinar: { category:"webinar", featured:false, allDay:false, tags:["Webinar","Microsoft","Partner Enablement"], description:"Tijdens dit webinar nemen we partners mee in het onderwerp, de praktische toepassing en de commerciële kansen." },
  workshop: { category:"workshop", featured:false, allDay:false, tags:["Workshop","Hands-on","Azure"], description:"In deze workshop gaan partners praktisch aan de slag met scenario's, demo's en concrete handvatten." },
  "solution-training": { category:"solution-training", featured:false, allDay:false, tags:["Training","Solution","Microsoft"], description:"Deze solution training helpt partners om de oplossing beter te positioneren, verkopen en technisch te onderbouwen." },
  "partner-event": { category:"partner-event", featured:false, allDay:false, tags:["Partner Event","ALSO","Cloud"], description:"Een partner event gericht op kennisdeling, inspiratie en praktische vervolgstappen voor ALSO Cloud partners." },
  "cloud-summit": { category:"cloud-summit", featured:true, allDay:true, tags:["Cloud Summit","AI","Cybersecurity","Partner Awards"], description:"De ALSO Cloud Summit brengt partners samen rondom strategie, innovatie en concrete cloudkansen." }
};

function $(id){ return document.getElementById(id); }

function slugify(value){
  return (value || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"");
}

function eventDate(event){ return event.allDay ? event.date : String(event.start || "").slice(0,10); }
function selected(){ return EVENTS.find(e => e.id === selectedId); }

function statusMsg(message, type){
  $("publishStatus").textContent = message;
  $("publishStatus").className = "status " + type;
}

function saveAdminKey(){
  sessionStorage.setItem("alsoAdminPublishKey", $("adminKeyInput").value.trim());
  statusMsg("Admin key tijdelijk opgeslagen.", "okmsg");
}

function getAdminKey(){
  return sessionStorage.getItem("alsoAdminPublishKey") || $("adminKeyInput").value.trim();
}

async function loadConfig(){
  CONFIG = await fetch("../data/config.json?ts=" + Date.now()).then(r => r.json());
  const categoryOptions = Object.entries(CONFIG.categories || {}).map(([key, value]) => `<option value="${key}">${value.label}</option>`).join("");
  $("category").innerHTML = categoryOptions;
}

async function loadEvents(){
  try {
    EVENTS = await fetch("events-admin.json?ts=" + Date.now()).then(r => {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    });
    $("systemStatus").textContent = "events-admin.json geladen: " + EVENTS.length + " event(s).";
    $("systemStatus").className = "status okmsg";
    render();
    if (EVENTS.length) selectEvent(EVENTS[0].id);
  } catch (error) {
    $("systemStatus").textContent = "Events laden mislukt: " + error.message;
    $("systemStatus").className = "status errmsg";
  }
}

function snapshot(){
  undoStack.push(JSON.stringify(EVENTS));
  if (undoStack.length > 20) undoStack.shift();
}

function undoLast(){
  if (!undoStack.length) return alert("Geen actie om ongedaan te maken.");
  EVENTS = JSON.parse(undoStack.pop());
  selectedId = null;
  render();
  statusMsg("Laatste wijziging ongedaan gemaakt.", "okmsg");
}

function render(){
  $("statTotal").textContent = EVENTS.length;
  $("statPublished").textContent = EVENTS.filter(e => e.status === "published").length;
  $("statDraft").textContent = EVENTS.filter(e => e.status === "draft").length;
  $("statArchived").textContent = EVENTS.filter(e => e.status === "archived").length;
  renderList();
  $("output").textContent = JSON.stringify(EVENTS, null, 2);
}

function renderList(){
  const q = ($("listSearch").value || "").toLowerCase();
  const status = $("statusFilter").value;
  const filtered = EVENTS.filter(e => (status === "all" || e.status === status) && (!q || JSON.stringify(e).toLowerCase().includes(q)));
  $("eventList").innerHTML = filtered.map(e => `<div class="event-item ${e.id === selectedId ? "active" : ""} ${e.status}" onclick="selectEvent('${e.id}')">
    <strong>${e.title}</strong> <span class="badge">${e.status}</span><br>
    <small>${eventDate(e)} · ${CONFIG.categories?.[e.category]?.label || e.category}</small>
  </div>`).join("") || "<p>Geen events gevonden.</p>";
}

function selectEvent(id){
  selectedId = id;
  const e = selected();
  if (!e) return;
  $("formTitle").textContent = "Event wijzigen";
  $("title").value = e.title || "";
  $("eventId").value = e.id || "";
  $("statusField").value = e.status || "draft";
  $("category").value = e.category || Object.keys(CONFIG.categories || {})[0] || "";
  $("featured").value = String(!!e.featured);
  $("allDay").value = String(!!e.allDay);
  $("date").value = e.allDay ? (e.date || "") : String(e.start || "").slice(0,10);
  $("startTime").value = e.allDay ? "10:00" : String((e.start || "T10:00").split("T")[1]).slice(0,5);
  $("endTime").value = e.allDay ? "11:00" : String((e.end || "T11:00").split("T")[1]).slice(0,5);
  $("location").value = e.location || "";
  $("registration").value = e.registrationUrl || "";
  $("bannerUrl").value = e.bannerUrl || "";
  $("tags").value = (e.tags || []).join(", ");
  $("description").value = e.description || "";
  toggleTime();
  detectConflicts();
  previewEvent();
  renderList();
}

function newEvent(){
  selectedId = null;
  $("formTitle").textContent = "Nieuw event";
  ["title","eventId","date","location","registration","bannerUrl","tags","description"].forEach(id => $(id).value = "");
  $("statusField").value = "draft";
  $("featured").value = "false";
  $("allDay").value = "false";
  $("startTime").value = "10:00";
  $("endTime").value = "11:00";
  toggleTime();
  previewEvent();
}

function toggleTime(){ $("timeFields").style.display = $("allDay").value === "true" ? "none" : "block"; }

function validateForm(){
  let valid = true;
  ["title","eventId","statusField","category","featured","allDay","date","location","registration","tags","description"].forEach(id => {
    const el = $(id);
    const ok = (el.value || "").trim().length > 0;
    el.classList.toggle("invalid", !ok);
    if (!ok) valid = false;
  });
  if ($("registration").value.trim() && !/^https?:\/\//i.test($("registration").value.trim())) {
    $("registration").classList.add("invalid");
    statusMsg("Registratie URL moet beginnen met https:// of http://", "errmsg");
    return false;
  }
  if (EVENTS.some(e => e.id === $("eventId").value.trim() && e.id !== selectedId)) {
    $("eventId").classList.add("invalid");
    statusMsg("Er bestaat al een event met deze unieke ID.", "errmsg");
    return false;
  }
  if (!valid) statusMsg("Vul alle verplichte velden in.", "errmsg");
  return valid;
}

function readForm(){
  const event = {
    id: $("eventId").value.trim(),
    title: $("title").value.trim(),
    status: $("statusField").value,
    location: $("location").value.trim(),
    category: $("category").value,
    featured: $("featured").value === "true",
    tags: $("tags").value.split(",").map(t => t.trim()).filter(Boolean),
    registrationUrl: $("registration").value.trim(),
    bannerUrl: $("bannerUrl").value.trim(),
    description: $("description").value.trim()
  };
  if ($("allDay").value === "true") {
    event.date = $("date").value;
    event.allDay = true;
  } else {
    event.start = `${$("date").value}T${$("startTime").value || "10:00"}:00`;
    event.end = `${$("date").value}T${$("endTime").value || "11:00"}:00`;
    event.allDay = false;
  }
  return event;
}

function saveEvent(){
  if (!validateForm()) return false;
  snapshot();
  const event = readForm();
  const idx = EVENTS.findIndex(e => e.id === selectedId || e.id === event.id);
  if (idx >= 0) EVENTS[idx] = event;
  else EVENTS.push(event);
  EVENTS.sort((a,b) => (eventDate(a) || "").localeCompare(eventDate(b) || ""));
  selectedId = event.id;
  render();
  selectEvent(event.id);
  statusMsg("Event lokaal opgeslagen. Klik op Publiceer naar GitHub om live te zetten.", "okmsg");
  return true;
}

function duplicateEvent(){
  if (!selectedId) return alert("Selecteer eerst een event.");
  snapshot();
  const base = selected();
  const copy = {...base, id: base.id + "-copy", title: base.title + " kopie", status: "draft"};
  EVENTS.push(copy);
  selectedId = copy.id;
  render();
  selectEvent(copy.id);
}

function archiveEvent(){
  if (!selectedId) return alert("Selecteer eerst een event.");
  snapshot();
  selected().status = "archived";
  render();
  selectEvent(selectedId);
}

function deleteEvent(){
  if (!selectedId) return alert("Selecteer eerst een event.");
  if (!confirm("Event definitief verwijderen?")) return;
  snapshot();
  EVENTS = EVENTS.filter(e => e.id !== selectedId);
  selectedId = null;
  newEvent();
  render();
}

function applyTemplate(){
  const template = templates[$("templatePicker").value];
  if (!template) return;
  $("category").value = template.category;
  $("featured").value = String(!!template.featured);
  $("allDay").value = String(!!template.allDay);
  $("tags").value = template.tags.join(", ");
  $("description").value = template.description;
  $("statusField").value = "draft";
  toggleTime();
  previewEvent();
}

function detectConflicts(){
  const d = $("date").value;
  if (!d) {
    $("warnings").style.display = "none";
    return;
  }
  const same = EVENTS.filter(e => e.id !== selectedId && eventDate(e) === d && e.status !== "archived");
  if (same.length) {
    $("warnings").style.display = "block";
    $("warnings").textContent = "Let op: er staan al " + same.length + " event(s) op deze datum: " + same.map(e => e.title).join(", ");
  } else {
    $("warnings").style.display = "none";
  }
}

function previewEvent(){
  $("preview").innerHTML = `<h3>${$("title").value || "Nieuw event"}</h3>
  <p>${$("date").value || "Geen datum"} · ${$("location").value || "Geen locatie"} · ${$("statusField").value}</p>
  <p>${($("description").value || "").replace(/\n/g, "<br>")}</p>`;
}

async function publishToGitHub(){
  if (!saveEvent()) return;
  if (!getAdminKey()) {
    statusMsg("Vul eerst de admin key in.", "errmsg");
    return;
  }
  if (!CONFIG.adminPublish?.endpointUrl) {
    statusMsg("Publish endpoint ontbreekt in config.json.", "errmsg");
    return;
  }
  if (!confirm("Publiceren naar GitHub?")) return;
  statusMsg("Publiceren gestart...", "okmsg");
  try {
    const response = await fetch(CONFIG.adminPublish.endpointUrl, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        adminKey: getAdminKey(),
        events: EVENTS,
        commitMessage: "Update events from V15.1 admin",
        timestampUtc: new Date().toISOString()
      })
    });
    if (!response.ok) throw new Error("HTTP " + response.status);
    statusMsg("Publicatie verzonden. Controleer GitHub Actions.", "okmsg");
  } catch (error) {
    statusMsg("Publiceren mislukt: " + error.message, "errmsg");
  }
}

function copyJson(){ navigator.clipboard.writeText(JSON.stringify(EVENTS, null, 2)); }

async function init(){
  await loadConfig();
  $("adminKeyInput").value = sessionStorage.getItem("alsoAdminPublishKey") || "";
  $("title").addEventListener("input", () => {
    if (!selectedId && !$("eventId").value) $("eventId").value = slugify($("title").value);
    previewEvent();
  });
  ["description","date","location","statusField","allDay"].forEach(id => $(id).addEventListener("input", () => {
    toggleTime();
    detectConflicts();
    previewEvent();
  }));
  $("listSearch").addEventListener("input", renderList);
  $("statusFilter").addEventListener("change", renderList);
  await loadEvents();
}

init();
</script>
</body>
</html>
